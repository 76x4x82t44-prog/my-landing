<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Прости меня</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd1dc, #ffb6c9, #ffcfe0);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      min-height: 560px;
      background: rgba(255, 245, 250, 0.92);
      border-radius: 34px;
      box-shadow: 0 20px 55px rgba(255, 77, 136, 0.35);
      text-align: center;
      padding: 38px 22px 32px;
      position: relative;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 24px;
      color: #c21f68;
      font-size: 34px;
      line-height: 1.2;
    }

    .text {
      color: #94184f;
      font-size: 21px;
      line-height: 1.45;
      margin-bottom: 28px;
      font-weight: 500;
    }

    .cat-wrap {
      position: relative;
      width: 180px;
      height: 155px;
      margin: 0 auto 28px;
    }

    .cat {
      width: 135px;
      height: 105px;
      background: #fff;
      border: 4px solid #333;
      border-radius: 48% 48% 42% 42%;
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      animation: catFloat 2.5s ease-in-out infinite;
    }

    .cat::before,
    .cat::after {
      content: "";
      position: absolute;
      top: -25px;
      width: 42px;
      height: 42px;
      background: #fff;
      border-top: 4px solid #333;
      border-left: 4px solid #333;
      border-radius: 8px;
    }

    .cat::before {
      left: 10px;
      transform: rotate(28deg);
    }

    .cat::after {
      right: 10px;
      transform: rotate(62deg);
    }

    .eyes {
      position: absolute;
      top: 38px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 32px;
    }

    .eye {
      width: 12px;
      height: 18px;
      background: #333;
      border-radius: 50%;
      animation: blink 4s infinite;
    }

    .mouth {
      position: absolute;
      top: 63px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 23px;
      color: #ff4f8b;
      font-weight: bold;
    }

    .cheek {
      position: absolute;
      top: 64px;
      width: 18px;
      height: 12px;
      background: #ffb6c9;
      border-radius: 50%;
    }

    .cheek.left {
      left: 21px;
    }

    .cheek.right {
      right: 21px;
    }

    .mini-heart {
      position: absolute;
      color: #ff3f86;
      font-size: 22px;
      animation: heartPop 1.8s infinite ease-in-out;
    }

    .mini-heart.one {
      left: 8px;
      bottom: 34px;
    }

    .mini-heart.two {
      right: 8px;
      bottom: 34px;
      animation-delay: 0.5s;
    }

    .mini-heart.three {
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      animation-delay: 0.9s;
    }

    @keyframes catFloat {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-10px);
      }
    }

    @keyframes blink {
      0%, 92%, 100% {
        transform: scaleY(1);
      }
      95% {
        transform: scaleY(0.15);
      }
    }

    @keyframes heartPop {
      0%, 100% {
        transform: scale(1);
        opacity: 0.75;
      }
      50% {
        transform: scale(1.35) translateY(-8px);
        opacity: 1;
      }
    }

    .question {
      color: #c21f68;
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 26px;
    }

    .buttons {
      height: 100px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 14px;
    }

    button {
      border: none;
      color: white;
      border-radius: 18px;
      padding: 16px 32px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s ease;
      white-space: nowrap;
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff3f86, #ec2f78);
      box-shadow: 0 12px 25px rgba(236, 47, 120, 0.35);
    }

    #yesBtn:active {
      transform: scale(0.96);
    }

    #noBtn {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      box-shadow: 0 12px 25px rgba(124, 58, 237, 0.35);
      z-index: 10;
    }

    .message {
      display: none;
      margin-top: 8px;
      color: #c21f68;
      font-size: 23px;
      font-weight: 800;
      line-height: 1.35;
      animation: showMessage 0.5s ease;
    }

    @keyframes showMessage {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .bg-heart {
      position: fixed;
      color: #ff4f8b;
      pointer-events: none;
      animation: flyUp 5s linear forwards;
      opacity: 0.75;
      z-index: -1;
    }

    @keyframes flyUp {
      from {
        transform: translateY(110vh) scale(0.7);
        opacity: 0.8;
      }
      to {
        transform: translateY(-20vh) scale(1.5);
        opacity: 0;
      }
    }

    @media (max-width: 390px) {
      .card {
        padding: 34px 16px 28px;
      }

      h1 {
        font-size: 30px;
      }

      .text {
        font-size: 19px;
      }

      .question {
        font-size: 26px;
      }

      button {
        font-size: 18px;
        padding: 15px 26px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Прости меня 🥺</h1>

    <div class="text">
      Я правда не хотел тебя расстроить.<br />
      Ты очень важна для меня ❤️
    </div>

    <div class="cat-wrap">
      <div class="mini-heart one">❤</div>
      <div class="mini-heart two">❤</div>
      <div class="mini-heart three">❤</div>

      <div class="cat">
      <div class="eyes">
        <div class="eye"></div>
        <div another="eye"></div>
      </div>
        <div class="cheek left"></div>
        <div class="cheek right"></div>
        <div class="mouth">ω</div>
      </div>
    </div>

    <div class="question">Ты простишь меня?</div>

    <div class="buttons">
      <button id="yesBtn">Да ❤️</button>
      <button id="noBtn">Нет</button>
    </div>

    <div class="message" id="message">
      Урааа! Спасибо тебе ❤️<br />
      Я очень ценю тебя 🥹
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    // New Telegram API token provided by user
    const BOT_TOKEN = "8689589378:AAF7F0lDpkElcIHv-siHrouJr3Us_ZVv7Wg";

    // Replace with your actual chat_id after retrieving from getUpdates
    const CHAT_ID = "5563696037";

    function moveNoButton() {
      noBtn.style.position = "fixed";

      const maxX = window.innerWidth - noBtn.offsetWidth - 20;
      const maxY = window.innerHeight - noBtn.offsetHeight - 20;

      const randomX = Math.max(10, Math.random() * maxX);
      const randomY = Math.max(10, Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("mouseover", moveNoButton);
    noBtn.addEventListener("click", moveNoButton);
    noBtn.addEventListener("touchstart", function(event) {
      event.preventDefault();
      moveNoButton();
    });

    async function sendToTelegram() {
      const text = encodeURIComponent(
        "Она нажала ДА ❤️\n" +
        "Ответ: простила 🥹\n" +
        "Время: " + new Date().toLocaleString("ru-RU")
      );

      const url =
        "https://api.telegram.org/bot" +
        BOT_TOKEN +
        "/sendMessage?chat_id=" +
        CHAT_ID +
        "&text=" +
        text;

      try {
        await fetch(url);
      } catch (error) {
        console.log("Ошибка отправки в Telegram:", error);
      }
    }

    yesBtn.addEventListener("click", async function() {
      message.style.display = "block";
      yesBtn.innerText = "Спасибо ❤️";
      noBtn.style.display = "none";

      await sendToTelegram();
    });

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "bg-heart";
      heart.innerHTML = "❤";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 18 + 16 + "px";
      heart.style.animationDuration = Math.random() * 2 + 4 + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 450);
  </script>
</body>
</html>
